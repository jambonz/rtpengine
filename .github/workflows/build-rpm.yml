name: Build RPM Package

# Triggers:
#   - workflow_dispatch (manual run from the Actions tab)
#   - push of a tag matching v*-jambonz* (our fork's release tags)
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*-jambonz*'

# Serialize concurrent RPM runs (separate group from build-deb so the
# two builds run in parallel on the same tag push).
concurrency:
  group: build-rpm
  cancel-in-progress: false

jobs:
  build-rpm:
    runs-on: ubuntu-24.04
    # Build inside Rocky Linux 9 so the produced .rpm links against the
    # libs shipped on EL9 (openssl3, ffmpeg from RPM Fusion, etc.) rather
    # than the runner's noble libs.
    container:
      image: rockylinux:9
    timeout-minutes: 60

    steps:
      - name: Bootstrap container
        # rockylinux:9 is minimal — pull in EPEL, the CRB repo (for
        # several -devel packages like libwebsockets-devel), and RPM
        # Fusion free (for ffmpeg-devel which isn't in the base repos).
        run: |
          dnf install -y dnf-plugins-core epel-release
          dnf config-manager --set-enabled crb
          dnf install -y \
            https://download1.rpmfusion.org/free/el/rpmfusion-free-release-9.noarch.rpm
          dnf install -y \
            git tar gzip rpm-build rpmdevtools redhat-rpm-config \
            awscli2 ca-certificates which

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from git tag
        id: version
        run: |
          # GitHub's container support mounts the workspace owned by a uid
          # the container's git considers 'dubious'. Allow it explicitly so
          # `git archive`/`git describe` work.
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          # Prefer the actual triggering tag if we're on one (most common
          # for production runs); fall back to git describe for manual
          # workflow_dispatch runs.
          if [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${{ github.ref_name }}"
          else
            TAG=$(git describe --tags --always 2>/dev/null || echo "v0.0.1-jambonz0")
          fi
          # Strip leading 'v'. RPM Version cannot contain '-', so split
          # 'v14.1.1.8-jambonz4' → Version=14.1.1.8, Release=jambonz4 on the
          # first hyphen. If there's no hyphen (manual dispatch off a non-
          # release SHA) fall back to a 0.0.0/sha release.
          STRIPPED=${TAG#v}
          if [[ "$STRIPPED" == *-* ]]; then
            VERSION="${STRIPPED%%-*}"
            RELEASE="${STRIPPED#*-}"
          else
            VERSION="$STRIPPED"
            RELEASE="0"
          fi
          # Release must be a single token, no slashes/spaces.
          RELEASE=$(printf '%s' "$RELEASE" | tr -c 'A-Za-z0-9._' '_')
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "RELEASE=${RELEASE}" >> "$GITHUB_OUTPUT"
          echo "Building Version=${VERSION} Release=${RELEASE}"

      - name: Install build dependencies
        # Mirror the BuildRequires in el/rtpengine.spec. iptables-devel
        # provides pkgconfig(libiptc). spandsp-devel and opus-devel come
        # from EPEL/CRB; ffmpeg-devel from RPM Fusion.
        run: |
          dnf install -y \
            gcc make pkgconfig \
            glib2-devel libcurl-devel openssl-devel \
            pcre2-devel zlib-devel hiredis-devel \
            systemd-devel \
            libpcap-devel libevent-devel json-glib-devel \
            mosquitto-devel \
            gperf perl-IPC-Cmd perl-podlators \
            libatomic libjwt-devel \
            mariadb-connector-c-devel \
            libwebsockets-devel spandsp-devel opus-devel \
            pandoc ncurses-devel iptables-devel \
            ffmpeg-devel

      - name: Stage spec and source tarball
        run: |
          mkdir -p "$HOME/rpmbuild"/{SOURCES,SPECS,BUILD,RPMS,SRPMS}
          VERSION='${{ steps.version.outputs.VERSION }}'
          RELEASE='${{ steps.version.outputs.RELEASE }}'
          # %setup -q -n %{name}-%{version} expects the tarball top-level
          # dir to be jambonz-rtpengine-<Version> (no Release component).
          git archive --format=tar \
            --prefix="jambonz-rtpengine-${VERSION}/" HEAD \
            | gzip -c > "$HOME/rpmbuild/SOURCES/jambonz-rtpengine-${VERSION}.tar.gz"
          # Inject Version/Release into the spec.
          sed -e "s/^Version:.*/Version:	${VERSION}/" \
              -e "s/^Release:.*/Release:	${RELEASE}%{?dist}/" \
              el/rtpengine.spec > "$HOME/rpmbuild/SPECS/jambonz-rtpengine.spec"
          head -10 "$HOME/rpmbuild/SPECS/jambonz-rtpengine.spec"

      - name: Build RPMs
        run: |
          rpmbuild --define "_topdir $HOME/rpmbuild" \
            -ba "$HOME/rpmbuild/SPECS/jambonz-rtpengine.spec"

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          cp "$HOME/rpmbuild/RPMS"/x86_64/*.rpm   artifacts/ 2>/dev/null || true
          cp "$HOME/rpmbuild/RPMS"/noarch/*.rpm   artifacts/ 2>/dev/null || true
          cp "$HOME/rpmbuild/SRPMS"/*.src.rpm     artifacts/ 2>/dev/null || true
          cd artifacts
          for f in *.rpm; do
            sha256sum "$f" > "${f}.sha256"
          done
          ls -lh

      - name: Upload to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_S3_REGION }}
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
        run: |
          # Trim any trailing whitespace/newline from the bucket value
          # (GitHub secrets sometimes get saved with stray whitespace).
          BUCKET=$(printf '%s' "$AWS_S3_BUCKET" | tr -d '[:space:]')
          aws s3 cp artifacts/ "s3://${BUCKET}/rtpengine/" \
              --recursive --include "*.rpm" --include "*.sha256"

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
