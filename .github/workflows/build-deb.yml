name: Build Debian Package

# Triggers:
#   - workflow_dispatch (manual run from the Actions tab)
#   - push of a tag matching mr*-jambonz* (our fork's release tags)
on:
  workflow_dispatch:
  push:
    tags:
      - 'mr*-jambonz*'

# Serialize concurrent runs so simultaneous tag pushes don't race the
# apt-repo dispatch / S3 upload.
concurrency:
  group: build-deb
  cancel-in-progress: false

jobs:
  build-deb:
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from git tag
        id: version
        run: |
          VERSION=$(git describe --tags --always 2>/dev/null || echo "0.0.1")
          # Strip a leading 'v' if present (we don't normally use one)
          VERSION=${VERSION#v}
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION}"

      - name: Update debian changelog version
        run: |
          # Replace the top changelog entry's version with the tag-derived one
          # so dpkg-buildpackage stamps the resulting .deb correctly.
          # The first stanza is the jambonz one we maintain.
          sed -i "0,/^jambonz-rtpengine (.*) bookworm/s//jambonz-rtpengine (${{ steps.version.outputs.VERSION }}) bookworm/" debian/changelog
          head -3 debian/changelog

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          # Pull deps from debian/control. Most are in jammy by name; a few
          # version constraints (libavcodec >= 6:10) need bookworm-backports
          # or are met on jammy by happy accident — we'll see what fails.
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            devscripts \
            debhelper \
            dh-dkms \
            dh-sequence-dkms \
            default-libmysqlclient-dev \
            discount \
            gperf \
            libavcodec-dev \
            libavfilter-dev \
            libavformat-dev \
            libavutil-dev \
            libbcg729-dev \
            libbencode-perl \
            libcrypt-openssl-rsa-perl \
            libcrypt-rijndael-perl \
            libcurl4-openssl-dev \
            libdigest-crc-perl \
            libdigest-hmac-perl \
            libevent-dev \
            libglib2.0-dev \
            libhiredis-dev \
            libio-multiplex-perl \
            libio-socket-inet6-perl \
            libio-socket-ip-perl \
            libiptc-dev \
            libjson-glib-dev \
            libjson-perl \
            libjwt-dev \
            libmosquitto-dev \
            libncurses-dev \
            libnet-interface-perl \
            libopus-dev \
            libpcap0.8-dev \
            libpcre2-dev \
            libsocket6-perl \
            libspandsp-dev \
            libssl-dev \
            libswresample-dev \
            libsystemd-dev \
            libtest2-suite-perl \
            liburing-dev \
            libwebsockets-dev \
            libwww-perl \
            libxtables-dev \
            pandoc \
            pkgconf \
            python3 \
            python3-websockets \
            zlib1g-dev

      - name: Build Debian package
        run: |
          # liburing-dev on jammy may be < 2.3 (the version constraint in
          # debian/control). Build with the nouring profile so we don't
          # require a newer one. Same for codec-chain (we never enable it).
          DEB_BUILD_PROFILES="pkg.jambonz-rtpengine.nouring" dpkg-buildpackage -b -us -uc

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          cp ../jambonz-rtpengine_*.deb artifacts/ 2>/dev/null || true
          cp ../jambonz-rtpengine-dkms_*.deb artifacts/ 2>/dev/null || true
          cp ../jambonz-rtpengine-utils_*.deb artifacts/ 2>/dev/null || true
          cd artifacts
          for d in *.deb; do
            sha256sum "$d" > "${d}.sha256"
          done
          ls -lh

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_S3_REGION }}

      - name: Upload to S3
        run: |
          aws s3 cp artifacts/ s3://${{ secrets.AWS_S3_BUCKET }}/rtpengine/ \
              --recursive --include "*.deb" --include "*.sha256"

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger apt repo refresh
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          curl -fsSL -X POST \
            -H "Authorization: Bearer ${{ secrets.APT_REPO_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/jambonz/apt-repo/dispatches \
            -d '{"event_type":"package-uploaded","client_payload":{"repo":"${{ github.repository }}","tag":"${{ github.ref_name }}"}}'
