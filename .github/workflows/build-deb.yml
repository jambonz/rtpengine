name: Build Debian Package

# Triggers:
#   - workflow_dispatch (manual run from the Actions tab)
#   - push of a tag matching v*-jambonz* (our fork's release tags)
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*-jambonz*'

# Serialize concurrent runs so simultaneous tag pushes don't race the
# apt-repo dispatch / S3 upload.
concurrency:
  group: build-deb
  cancel-in-progress: false

jobs:
  build-deb:
    runs-on: ubuntu-24.04
    # Build inside a Debian bookworm container so the produced .deb
    # links against the libs customers run on bookworm (libssl3,
    # libavcodec59, libwebsockets, etc.) — not noble's newer libs.
    container:
      image: debian:bookworm
    timeout-minutes: 45

    steps:
      - name: Bootstrap container
        # debian:bookworm is minimal — install the tools the rest of the
        # workflow needs (git for actions/checkout, curl for the dispatch,
        # awscli for S3 upload, gnupg for signed-by apt sources).
        run: |
          apt-get update -qq
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
              git curl ca-certificates gnupg awscli xz-utils

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from git tag
        id: version
        run: |
          # GitHub's container support mounts the workspace owned by a uid
          # the container's git considers 'dubious'. Allow it explicitly so
          # `git describe` works.
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          # Prefer the actual triggering tag if we're on one (most common
          # for production runs); fall back to git describe for manual
          # workflow_dispatch runs.
          if [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION=$(git describe --tags --always 2>/dev/null || echo "0.0.1")
          fi
          # Debian package versions must start with a digit. Strip 'v'.
          VERSION=${VERSION#v}
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION}"

      - name: Update debian changelog version
        run: |
          # Replace the top stanza's version with the tag-derived one.
          sed -i "0,/^jambonz-rtpengine (.*) bookworm/s//jambonz-rtpengine (${{ steps.version.outputs.VERSION }}) bookworm/" debian/changelog
          head -3 debian/changelog

      - name: Install build dependencies
        run: |
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            build-essential \
            devscripts \
            debhelper \
            dh-sequence-dkms \
            dkms \
            systemd \
            default-libmysqlclient-dev \
            discount \
            gperf \
            libavcodec-dev \
            libavfilter-dev \
            libavformat-dev \
            libavutil-dev \
            libbcg729-dev \
            libbencode-perl \
            libcjson-dev \
            libcrypt-openssl-rsa-perl \
            libcrypt-rijndael-perl \
            libcurl4-openssl-dev \
            libdigest-crc-perl \
            libdigest-hmac-perl \
            libevent-dev \
            libglib2.0-dev \
            libhiredis-dev \
            libio-multiplex-perl \
            libio-socket-inet6-perl \
            libio-socket-ip-perl \
            libiptc-dev \
            libjson-glib-dev \
            libjson-perl \
            libjwt-dev \
            libmosquitto-dev \
            libncurses-dev \
            libnet-interface-perl \
            libopus-dev \
            libpcap0.8-dev \
            libpcre2-dev \
            libsocket6-perl \
            libspandsp-dev \
            libssl-dev \
            libswresample-dev \
            libsystemd-dev \
            libtest2-suite-perl \
            liburing-dev \
            libwebsockets-dev \
            libwww-perl \
            libxtables-dev \
            pandoc \
            pkgconf \
            python3 \
            python3-websockets \
            zlib1g-dev

      - name: Build Debian package
        run: |
          # Bookworm's liburing-dev is 2.3 (matches the constraint), so we
          # don't need the nouring profile. Keep the no-codec-chain build
          # (default) since we don't ship ngcp-libcodec-chain-dev.
          dpkg-buildpackage -b -us -uc

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          cp ../jambonz-rtpengine_*.deb artifacts/ 2>/dev/null || true
          cp ../jambonz-rtpengine-dkms_*.deb artifacts/ 2>/dev/null || true
          cp ../jambonz-rtpengine-utils_*.deb artifacts/ 2>/dev/null || true
          cd artifacts
          for d in *.deb; do
            sha256sum "$d" > "${d}.sha256"
          done
          ls -lh

      - name: Upload to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_S3_REGION }}
        run: |
          aws s3 cp artifacts/ s3://${{ secrets.AWS_S3_BUCKET }}/rtpengine/ \
              --recursive --include "*.deb" --include "*.sha256"

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger apt repo refresh
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          curl -fsSL -X POST \
            -H "Authorization: Bearer ${{ secrets.APT_REPO_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/jambonz/apt-repo/dispatches \
            -d '{"event_type":"package-uploaded","client_payload":{"repo":"${{ github.repository }}","tag":"${{ github.ref_name }}"}}'
